esphome:
  name: irrcntone
  friendly_name: Irrigation Control One
  
esp32:
  board: esp32dev
  framework:
    type: esp-idf

wifi:
  ssid: !secret AP
  password: !secret APPW
  

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret ENC_KEY

ota:
  platform: esphome
  password: !secret OTA_PW
 
bluetooth_proxy:

switch:
  - platform: gpio
    name: porch_plot_valve
    pin: 
      number: GPIO05
      inverted: false
  - platform: gpio
    name: porch_rail_valve
    pin: 
      number: GPIO04
      inverted: false
