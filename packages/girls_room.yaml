homeassistant:
  customize:
    fan.emi_fan:
      friendly_name: Girls Fan
    light.emi_fan_light:
      friendly_name: Girls Fan Light
    binary_sensor.emi_motion:
      friendly_name: Girls Bedroom Motion
    sensor.emi_temp:
      friendly_name: Girls Bedroom Temperature
    switch.emi_tv:
      friendly_name: Girls TV Switch
  
          
light:
  - platform: group
    name: emi_star_lamp
    entities:
      - light.emi_star_1
      - light.emi_star_2
      - light.emi_star_3

input_boolean:
  emi_wake:

sensor:
  - platform: integration
    source: sensor.shelly1pm_c45bbe6b41e3_power
    name: kids_fan_power
    unit_prefix: k
    unit_time: h 
    round: 2  
    method: left 


media_player:
   
  - platform: universal
    name: emi_media
    children:
      - media_player.emi_kodi
      - media_player.emi_shield
      
    
automation:
  - id: emi_fan_speed
    alias: emi_fan_speed
    initial_state: 'off'
    trigger:
    - entity_id: sensor.emi_temp
      platform: state
    - entity_id: 'fan.emi_fan'
      platform: state
    condition:
      - condition: state
        entity_id: 'fan.emi_fan'
        state: 'on'
    action:
    - service: fan.set_percentage
      data_template:
        entity_id: fan.emi_fan
      data:
        percentage: >
          {% if (states.sensor.emi_temp.state|float(default=0) > 80 ) %}
            100
          {% elif (states.sensor.emi_temp.state|float(default=0) <= 80 ) and (states.sensor.emi_temp.state|float(default=0) > 76 ) %} 
            75
          {% elif (states.sensor.emi_temp.state|float(default=0) <= 76 ) and (states.sensor.emi_temp.state|float(default=0) > 74 ) %} 
            50
          {% elif (states.sensor.emi_temp.state|float(default=0) <= 74 ) %} 
            25
          {% endif %}
  
  - id: 'emi_tv_off'
    alias: emi_tv_off
    initial_state: 'off'
    trigger:
    - platform: time
      at: '20:30:00'
    condition: []
    action:
    - data:
        entity_id: switch.emi_tv
      service: switch.turn_off

  - id: 'emi_tv_on'
    alias: emi_tv_on
    initial_state: 'off'
    condition:
      alias: "Emi TV Time"
      condition: time
      after: "6:00:00"
      before: "20:30:00"
    trigger:
      platform: state
      entity_id: media_player.emi_shield
      from: 'off'
    action:
    - data:
        entity_id: switch.girls_tv
      service: switch.turn_on     
      
  - id: 'emi_tv_off_idle'
    alias: emi_tv_off_idle
    initial_state: 'off'
    condition: []
    trigger:
      platform: state
      entity_id: media_player.emi_shield
      from: 'on'
    action:
    - data:
        entity_id: switch.girls_tv
      service: switch.turn_off 

  - id: 'girls_bedroom_wakeup'
    alias: girls_bedroom_wakeup
    initial_state: 'off'
    trigger:
    - platform: time
      at: '9:30:00'
    condition:  []
    action:
    - service: light.turn_on
      data:
        entity_id: light.girls_bedroom_eth_va_emi_star
        brightness: 10
    - delay: '00:00:30'
    - service: light.turn_on
      data:
        entity_id: light.emi_star_lamp
        brightness: 255
        transition: 1800
    - service: script.turn_on
      data:
        entity_id: script.emilia_wakeup_ollama
        
  - id: emi_wake
    alias: emi_wake
    mode: parallel
    triggers:
      - platform: state
        entity_id: input_boolean.emi_wake
        to: "on"
    conditions: []
    actions:
      - action: media_player.turn_on
        target:
          entity_id: 'media_player.kidsroomspeaker'
      - repeat:
          sequence:
            - delay: '00:00:03'
            - action: media_player.play_media
              target:
                 entity_id: 'media_player.kidsroomspeaker'
              data:
                media_content_id: media-source://media_source/media/Server/media/Sorted Music/beep-6-96243.mp3
                media_content_type: audio/mpeg
              metadata:
                title: beep-6-96243.mp3
                thumbnail: null
                media_class: music
                children_media_class: null
                navigateIds:
                  - {}
                  - media_content_type: app
                    media_content_id: media-source://media_source
                  - media_content_type: ""
                    media_content_id: media-source://media_source/media/Server
                  - media_content_type: ""
                    media_content_id: media-source://media_source/media/Server/media
                  - media_content_type: ""
                    media_content_id: media-source://media_source/media/Server/media/Sorted Music
          while:
            - condition: template
              value_template: "{{ is_state(trigger.entity_id, 'on') }}"
     
input_number:
  emi_night_timer:
    name: "Emi nighttime routine timer"
    mode: slider
    initial: 0
    min: 0
    max: 60
    step: 1
    unit_of_measurement: "M"

script:
  goodnight_emi:
    mode: single
    sequence:
      - service:  light.turn_on
        target:
          entity_id:  light.emi_star_lamp
        data:
          kelvin: 2800
          brightness_pct: 25
      - service:  fan.turn_on
        target:
          entity_id:  fan.emi_fan
      - service:  light.turn_on
        target:
          entity_id:  light.hallway
        data:
          brightness_pct: 25
      - delay: "{{ states('input_number.emi_night_timer') | multiply(60) | int }}"
      - service:  light.turn_off
        data:
          entity_id:  light.emi_fan_light
      - service:  light.turn_on
        target:
          entity_id:  light.emi_star_lamp
        data:
          brightness_pct: 10
          transition: 900
      - delay:
          minutes: 15
      - service:  light.turn_off
        target:
          entity_id:  light.emi_star_lamp
        data:
          transition: 300
      - service:  light.turn_off
        target:
          entity_id:  light.hallway
        data:
          transistion: 600
      - delay:
          minutes: 180


  reset_emi_fan:
    mode: restart
    sequence:
      - service:  switch.turn_on
        target:
          entity_id:  switch.shelly1pm_c45bbe6b41e3
      - delay: 5
      - repeat:
          count: '5'
          sequence:
            - service:  switch.turn_off
              target:
                entity_id:  switch.shelly1pm_c45bbe6b41e3
            - delay: 5
            - service:  switch.turn_on
              target:
                entity_id:  switch.shelly1pm_c45bbe6b41e3
            - delay: 5

script:
  emilia_wakeup_ollama:
    alias: Emilia Wakeup Ollama
    mode: single
    sequence:
      - variables:
          wakeup_prompt: >
            Generate a wake up message addressed to Emilia.
            The message should take approximately 30 minutes to read aloud.
            Start very gentle, calm, and soothing.
            Gradually become more encouraging, energetic, and urgent as the message continues.
            Include reminders about getting ready for the day, waking up slowly,
            stretching, opening eyes, getting out of bed, and starting the morning.
            Avoid repeating the same phrases too often.
            The response should be plain spoken text only with no markdown formatting.

      # Generate text using the Ollama Conversation integration
      - service: conversation.process
        data:
          agent_id: conversation.ollama_conversation
          text: "{{ wakeup_prompt }}"
        response_variable: ollama_response

      # Optional debug log
      - service: system_log.write
        data:
          level: info
          message: >
            Emilia wakeup message generated:
            {{ ollama_response.response.speech.plain.speech[:500] }}

      # Speak the generated message using Piper TTS
      - service: tts.speak
        target:
          entity_id: tts.piper
        data:
          media_player_entity_id: media_player.girls_bedroom_eth_va_girls_bedroom_eth_va_media
          message: >
            {{ ollama_response.response.speech.plain.speech }}
