homeassistant:
  customize:  

utility_meter:
  daily_rain:
    source: sensor.weather_station_precipitation
    cycle: daily

sensor:
  - platform: integration
    source: sensor.reference_evapotranspiration
    name: daily_et
    unit_time: d

automation:
  - id: 'irrigattion'
    alias: irrigation
    trigger:
      - platform: calendar
        event: start
        entity_id: calendar.teamcarriger_gmail_com
    condition:
      - condition: template
        value_template: "{{ 'Irrigate' in trigger.calendar_event.summary }}"
    action:
      - if:
          - "{{ trigger.event == 'start' }}"
        then:
          - service: switch.turn_on
            entity_id: switch.rainbrarrel_backyard_irrigation
    mode: queued
    
  - alias: Update Soil Water Balance
    trigger:
      - platform: time
        at: "23:59:00"
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.soil_water_balance
        data:
          value: >
            {% set current =
                 states('input_number.soil_water_balance') | float(0) %}
            {% set rain =
                 states('sensor.daily_rain') | float(0) %}
            {% set et =
                 states('sensor.daily_et') | float(0) * 0.03937 %}
            {{ (current + rain - et) | round(3) }}


template:
  - sensor:
      - name: "Reference Evapotranspiration"
        unique_id: reference_evapotranspiration
        unit_of_measurement: "mm/day"
        state_class: measurement
        state: >
          {% set temp_f = states('sensor.weather_station_temperature')|float(0) %}
          {% set rh = states('sensor.weather_station_humidity')|float(0) %}
          {% set wind_mph = states('sensor.weather_station_wind_speed')|float(0) %}
          {% set lux = states('sensor.weather_station_illuminance')|float(0) %}
          {% set pressure_hpa = states('sensor.weather_station_pressure')|float(1013.25) %}

          {# Temperature F -> C #}
          {% set t = (temp_f - 32) * 5 / 9 %}

          {# Wind mph -> m/s #}
          {% set u2 = wind_mph * 0.44704 %}

          {# Saturation vapor pressure (kPa) #}
          {% set es = 0.6108 * e ** ((17.27 * t) / (t + 237.3)) %}

          {# Actual vapor pressure (kPa) #}
          {% set ea = es * rh / 100 %}

          {# Vapor pressure deficit #}
          {% set vpd = es - ea %}

          {# Slope of vapor pressure curve (kPa/C) #}
          {% set delta = 4098 * es / ((t + 237.3) ** 2) %}

          {# Pressure hPa -> kPa #}
          {% set p = pressure_hpa / 10 %}

          {# Psychrometric constant (kPa/C) #}
          {% set gamma = 0.000665 * p %}

          {# Approximate radiation from lux #}
          {% set rs_wm2 = lux / 120 %}

          {# Approximate net radiation MJ/m²/day #}
          {% set rn = rs_wm2 * 0.0864 * 0.77 %}

          {# Daily soil heat flux #}
          {% set g = 0 %}

          {% set eto =
            (
              0.408 * delta * (rn - g)
              +
              gamma * (900 / (t + 273)) * u2 * vpd
            )
            /
            (
              delta + gamma * (1 + 0.34 * u2)
            )
          %}

          {{ [eto,0] | max | round(2) }}
          
  - binary_sensor:
      - name: Irrigation Needed
        state: >
          {{ states('input_number.soil_water_balance') | float(0) < -0.50 }}

  - sensor:
      - name: "Wind Direction Compass"
        unique_id: wind_direction_compass
        state: >
          {% set deg = states('sensor.weather_station_wind_direction') | float(0) %}
          {% set dirs = [
            'N', 'NNE', 'NE', 'ENE',
            'E', 'ESE', 'SE', 'SSE',
            'S', 'SSW', 'SW', 'WSW',
            'W', 'WNW', 'NW', 'NNW'
          ] %}
          {% set index = ((deg + 11.25) / 22.5) | int %}
          {{ dirs[index % 16] }}
          
input_number:
  soil_water_balance:
    name: Soil Water Balance
    min: -20
    max: 20
    step: 0.01
          
