homeassistant:
  customize:  

utility_meter:
  daily_rain:
    source: sensor.weather_station_precipitation
    cycle: daily

automation:
  - id: 'irrigattion'
    alias: irrigation
    trigger:
      - platform: calendar
        event: start
        entity_id: calendar.teamcarriger_gmail_com
    condition:
      - condition: template
        value_template: "{{ 'Irrigate' in trigger.calendar_event.summary }}"
    action:
      - if:
          - "{{ trigger.event == 'start' }}"
        then:
          - service: switch.turn_on
            entity_id: switch.rainbrarrel_backyard_irrigation
    mode: queued

# (0.408 × Δ × (sensor.weather_station_illuminance / 115) + 0.065 * (900/(sensor.weather_station_temperature+273)) * sensor.weather_station_wind_speed * (es - ea)) / (Δ + 0.065 * (1 + 0.34 * sensor.weather_station_wind_speed))
template:
  - sensor:
      - name: "Wind Direction Compass"
        unique_id: wind_direction_compass
        state: >
          {% set deg = states('sensor.weather_station_wind_direction') | float(0) %}
          {% set dirs = [
            'N', 'NNE', 'NE', 'ENE',
            'E', 'ESE', 'SE', 'SSE',
            'S', 'SSW', 'SW', 'WSW',
            'W', 'WNW', 'NW', 'NNW'
          ] %}
          {% set index = ((deg + 11.25) / 22.5) | int %}
          {{ dirs[index % 16] }}
