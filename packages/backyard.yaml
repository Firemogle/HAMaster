homeassistant:
  customize:  

utility_meter:
  daily_rain:
    source: sensor.weather_station_precipitation
    cycle: daily
  daily_et:
    source: sensor.reference_evapotranspiration_accumulated
    cycle: daily


sensor:
  - platform: integration
    source: sensor.reference_evapotranspiration_hourly
    name: reference_evapotranspiration_accumulated
    unit_time: h
    round: 3
    method: trapezoidal

input_boolean:
  irrigate_today:
    name: Irrigate Today
    icon: mdi:sprinkler

automation:
  - id: 'irrigation'
    alias: irrigation
    trigger:
      - platform: calendar
        event: start
        entity_id: calendar.teamcarriger_gmail_com
    condition:
      - condition: template
        value_template: >
          {{ 'Irrigate' in trigger.calendar_event.summary }}
    action:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.irrigate_today
      - if:
          - condition: numeric_state
            entity_id: input_number.irrigation_deficit
            above: 0.1
        then:
          # Fill the rain barrel if needed (up to two attempts)
          - repeat:
              count: 2
              sequence:
                - if:
                    - condition: template
                      value_template: >
                        {{
                          states('sensor.rainbarrel_tank_height') | float(0)
                          <
                          (
                            states('input_number.irrigation_deficit') | float(0)
                            * 16.66
                            * 1.2
                            * (states('number.backyard_rainbarrel_loops') | float(0) + 1)
                          )
                        }}
                  then:
                    - service: switch.turn_on
                      target:
                        entity_id: switch.backyard_rainbarrel_rainbarrel_hose_fill
                    - delay: "00:25:00"
                    - service: switch.turn_off
                      target:
                        entity_id: switch.backyard_rainbarrel_rainbarrel_hose_fill
                    - delay: "00:25:00"
          - service: number.set_value
            target:
              entity_id: number.rainbrarrel_backyard_irrigation_multiplier
            data:
              value: "{{ states('input_number.irrigation_deficit') | float(0) }}"
          - service: input_number.set_value
            target:
              entity_id: input_number.irrigation_deficit
            data:
              value: 0
          - service: switch.turn_on
            target:
              entity_id: switch.rainbrarrel_auto_advance_byi
          - service: switch.turn_on
            target:
              entity_id: switch.rainbrarrel_backyard_irrigation
    mode: queued

  - id: 'irrigation_porch_rail'
    alias: irrigation_porch_rail
    trigger:
      - platform: time
        at: "11:00:00"
    condition:
      - condition: state
        entity_id: input_boolean.irrigate_today
        state: "on"
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.irrigate_today
      - service: number.set_value
        target:
          entity_id: number.rainbrarrel_backyard_irrigation_multiplier
        data:
          value: 1
      - service: switch.turn_on
        target:
          entity_id: switch.rainbarrel_porch_rail
    mode: single

  - id: irrigation_water_balance   
    alias: irrigation_water_balance
    trigger:
      - platform: time
        at: "23:59:00"
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.irrigation_deficit
        data:
          value: >
            {% set current =
               states('input_number.irrigation_deficit')
               | float(0) %}

            {% set et =
               states('sensor.daily_et')
               | float(0) * 0.03937 * 1.3 %}

            {% set rain =
               states('sensor.daily_rain')
               | float(0) %}

            {{ (current + et - rain) | round(3) }}
 
template:
  - sensor:
      - name: Reference Evapotranspiration Hourly
        unique_id: reference_evapotranspiration_hourly
        unit_of_measurement: "mm/h"
        state_class: measurement
        state: >
          {% set temp_f = states('sensor.weather_station_temperature')|float(0) %}
          {% set rh = states('sensor.weather_station_humidity')|float(0) %}
          {% set wind_mph = states('sensor.weather_station_wind_speed')|float(0) %}
          {% set lux = states('sensor.weather_station_illuminance')|float(0) %}
          {% set pressure_hpa = states('sensor.weather_station_pressure')|float(1013.25) %}

          {% set t = (temp_f - 32) * 5 / 9 %}
          {% set u2 = wind_mph * 0.44704 %}

          {% set es = 0.6108 * e ** ((17.27 * t) / (t + 237.3)) %}
          {% set ea = es * rh / 100 %}
          {% set vpd = es - ea %}

          {% set delta = 4098 * es / ((t + 237.3) ** 2) %}
          {% set gamma = 0.000665 * (pressure_hpa / 10) %}

          {# Lux -> W/m² #}
          {% set rs = lux / 120 %}

          {# W/m² -> MJ/m²/hr #}
          {% set rn = rs * 0.0036 * 0.77 %}

          {% set g = rn * 0.1 %}

          {% set eto =
            (
              (0.408 * delta * (rn - g))
              +
              (
                gamma * (37 / (t + 273))
                * u2 * vpd
              )
            )
            /
            (
              delta + gamma * (1 + 0.24 * u2)
            )
          %}

          {{ [eto, 0] | max | round(4) }}

  - sensor:
      - name: Daily Water Deficit
        unique_id: daily_water_deficit
        unit_of_measurement: "in"
        state_class: measurement
        state: >
          {% set et_in =
             states('sensor.daily_et')|float(0) * 0.03937 %}

          {% set rain_in =
             states('sensor.daily_rain')|float(0) %}

          {{ [et_in - rain_in, 0] | max | round(3) }}
          
  - sensor:
      - name: "Wind Direction Compass"
        unique_id: wind_direction_compass
        state: >
          {% set deg = states('sensor.weather_station_wind_direction') | float(0) %}
          {% set dirs = [
            'N', 'NNE', 'NE', 'ENE',
            'E', 'ESE', 'SE', 'SSE',
            'S', 'SSW', 'SW', 'WSW',
            'W', 'WNW', 'NW', 'NNW'
          ] %}
          {% set index = ((deg + 11.25) / 22.5) | int %}
          {{ dirs[index % 16] }}

          
          
          
input_number:
  irrigation_deficit:
    min: -10
    max: 10
    step: 0.01
